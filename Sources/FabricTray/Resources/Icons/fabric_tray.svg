<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 18 18" fill="none">
  <!-- Faceted diamond gem — menu bar template icon -->
  <!-- Outer diamond shape -->
  <path d="M9 1.5 L4.2 8.1 L9 16.5 L13.8 8.1 Z" stroke="currentColor" stroke-width="1.2" fill="currentColor" fill-opacity="0.15"/>
  <!-- Top crown facets -->
  <path d="M9 1.5 L6.6 5.1 L9 6.3 L11.4 5.1 Z" fill="currentColor" fill-opacity="0.7"/>
  <!-- Left facet -->
  <path d="M4.2 8.1 L6.6 5.1 L6.6 10.5 Z" fill="currentColor" fill-opacity="0.4"/>
  <!-- Right facet -->
  <path d="M13.8 8.1 L11.4 5.1 L11.4 10.5 Z" fill="currentColor" fill-opacity="0.5"/>
  <!-- Center vertical line -->
  <line x1="9" y1="6.3" x2="9" y2="16.5" stroke="currentColor" stroke-width="0.8" opacity="0.6"/>
  <!-- Inner horizontal facet line -->
  <line x1="6.6" y1="5.1" x2="11.4" y2="5.1" stroke="currentColor" stroke-width="0.8" opacity="0.5"/>
  <!-- Cross facet lines -->
  <line x1="4.2" y1="8.1" x2="9" y2="6.3" stroke="currentColor" stroke-width="0.7" opacity="0.4"/>
  <line x1="13.8" y1="8.1" x2="9" y2="6.3" stroke="currentColor" stroke-width="0.7" opacity="0.4"/>
  <!-- Lower facet lines -->
  <line x1="6.6" y1="10.5" x2="9" y2="16.5" stroke="currentColor" stroke-width="0.7" opacity="0.4"/>
  <line x1="11.4" y1="10.5" x2="9" y2="16.5" stroke="currentColor" stroke-width="0.7" opacity="0.4"/>
</svg>